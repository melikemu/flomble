<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Renk Referans</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background: #06060e;
  color: #fff;
  padding: 32px 24px;
}
h1 {
  font-size: 0.72rem;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,.22);
  margin-bottom: 28px;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 32px;
  max-width: 820px;
}
.pair {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px;
}
.num {
  font-size: 0.72rem;
  font-weight: 700;
  color: rgba(255,255,255,.25);
  width: 18px;
  text-align: right;
  flex-shrink: 0;
}
.card {
  width: 72px;
  height: 72px;
  border-radius: 12px;
  flex-shrink: 0;
}
.swatch {}
.name-card {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px;
}
.name-card span {
  font-weight: 800;
  font-size: 0.6rem;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  line-height: 1.25;
  font-family: -apple-system, sans-serif;
}
.label {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-left: 2px;
}
.label-name {
  font-size: 0.78rem;
  font-weight: 700;
  color: rgba(255,255,255,.8);
}
.label-hex {
  font-size: 0.62rem;
  color: rgba(255,255,255,.25);
  letter-spacing: 0.5px;
}
.label-display {
  font-size: 0.6rem;
  color: rgba(255,255,255,.2);
  margin-top: 2px;
}
.divider {
  width: 1px;
  height: 40px;
  background: rgba(255,255,255,.1);
  flex-shrink: 0;
  margin: 0 2px;
}
</style>
</head>
<body>

<h1>Renk Çiftleri — Referans</h1>
<div class="grid" id="grid"></div>

<script>
const COLORS = [
  { name: 'Kırmızı',    hex: '#FF3B30' },
  { name: 'Turuncu',    hex: '#FF9500' },
  { name: 'Sarı',       hex: '#FFEA00' },
  { name: 'Yeşil',      hex: '#30D158' },
  { name: 'Camgöbeği',  hex: '#00C7BE' },
  { name: 'Mavi',       hex: '#007AFF' },
  { name: 'Mor',        hex: '#BF5AF2' },
  { name: 'Pembe',      hex: '#FF69B4' },
  { name: 'Kahverengi', hex: '#AC8E68' },
  { name: 'Beyaz',      hex: '#F2F2F7' },
  { name: 'Gri',        hex: '#8E8E93' },
  { name: 'Siyah',      hex: '#1C1C1E' },
];

const displayHex = i => COLORS[(i + 5) % 12].hex;

function lum(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return 0.299*r + 0.587*g + 0.114*b;
}

const grid = document.getElementById('grid');

COLORS.forEach((c, i) => {
  const dHex   = displayHex(i);
  const dName  = COLORS[(i + 5) % 12].name;
  const textColor = lum(dHex) > 145 ? 'rgba(0,0,0,.78)' : 'rgba(255,255,255,.92)';
  const needsRing = lum(c.hex) > 185;

  const row = document.createElement('div');
  row.className = 'pair';
  row.innerHTML = `
    <div class="num">${i + 1}</div>

    <div class="card swatch" style="
      background:${c.hex};
      ${needsRing ? 'box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.15);' : ''}
    "></div>

    <div class="divider"></div>

    <div class="card name-card" style="background:${dHex}; border-radius:12px;">
      <span style="color:${textColor};">${c.name}</span>
    </div>

    <div class="label">
      <div class="label-name">${c.name}</div>
      <div class="label-hex">${c.hex}</div>
      <div class="label-display">yazı rengi: ${dName} ${dHex}</div>
    </div>
  `;
  grid.appendChild(row);
});
</script>
</body>
</html>
